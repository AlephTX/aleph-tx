# AlephTX 优化配置 (推荐)
# 基于顶级量化机构标准调优

[backpack]
# 风险配置 - 更激进的资本利用
risk_fraction = 0.12          # 12% 风险资本 (原 10%)
min_spread_bps = 15.0         # 15bps 最小 spread (原 18bps)
vol_multiplier = 3.0          # 波动率乘数 (原 3.5)
stop_loss_pct = 0.006         # 0.6% 止损 (原 0.5%)
requote_interval_ms = 2500    # 2.5秒重新报价 (原 3秒)
momentum_threshold_bps = 6.0  # 6bps 动量阈值 (原 8bps)
momentum_spread_mult = 1.8    # 动量 spread 倍数 (原 2.0)
vol_window = 150              # 150 样本波动率窗口 (原 120)
balance_refresh_secs = 45     # 45秒刷新余额 (原 60秒)

[edgex]
# EdgeX 费用更高，需要更宽 spread
risk_fraction = 0.10          # 10% 风险资本 (原 8%)
min_spread_bps = 22.0         # 22bps 最小 spread (原 25bps)
vol_multiplier = 3.5          # 波动率乘数 (原 4.0)
stop_loss_pct = 0.006         # 0.6% 止损
requote_interval_ms = 3500    # 3.5秒重新报价 (原 4秒)
momentum_threshold_bps = 8.0  # 8bps 动量阈值 (原 10bps)
momentum_spread_mult = 1.8    # 动量 spread 倍数 (原 2.0)
vol_window = 150              # 150 样本
balance_refresh_secs = 45     # 45秒刷新
min_order_size = 0.1          # 最小订单 0.1 ETH

# 优化说明:
# 1. 降低 min_spread_bps: 提高成交率，但需要更好的库存管理
# 2. 降低 requote_interval: 更快响应市场变化
# 3. 提高 vol_window: 更平滑的波动率估计
# 4. 降低 momentum_spread_mult: 不要过度反应动量信号
# 5. 提高 risk_fraction: 更充分利用资本（需要严格风控）

# 风险警告:
# - 更激进的配置需要更好的监控
# - 建议先在小资金上测试
# - 密切关注 adverse selection rate
# - 如果 Sharpe < 1.5，回退到保守配置
